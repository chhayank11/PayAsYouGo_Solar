server:
  port: 8080

spring:
  application:
    name: payg-solar-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/payg_solar_db
    username: postgres
    password: 0009
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update   #  later change to 'validate'
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

#  jackson:
#    serialization:
#      WRITE_DATES_AS_TIMESTAMPS: false

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

payg:
  plans:
    daily-days: 1
    weekly-days: 7